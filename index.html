<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAJS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-tabs">
      <div class="input">
        <input id="file-input" type="file" multiple accept=".pdf" />
        <progress id="progress-bar" value="0" max="1"></progress>
        <ul id="input-list"></ul>
      </div>

      <div class="query">
        <form>
          <input type="text" id="query-text" name="query" />
          <input id="query-submit" type="submit" value="SEARCH" disabled />
        </form>
        <ul id="output-list"></ul>
      </div>

      <div class="viewer">
        <div id="canvas-viewer"></div>
      </div>
    </div>
  </body>
  <script type="module" src="main.js"></script>
</html>
